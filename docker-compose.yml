version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Monica Medical AI Server - Docker Compose
#
# 使用方式：
#   cp .env.example .env          # 填写真实配置
#   docker compose up -d          # 启动所有服务
#   docker compose logs -f app    # 查看日志
#   docker compose down           # 停止
# ─────────────────────────────────────────────────────────────────

services:

  # ── Redis（任务队列）────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI 应用（含 ARQ Worker，由 supervisord 管理）──────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: monica-server:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内 Redis 地址覆盖（service name 解析）
      REDIS_URL: "redis://redis:6379/0"
      # 容器内存储路径（映射到 volume）
      STORAGE_ROOT: "/opt/monica-server/storage"
    volumes:
      # 持久化存储（DICOM、切片、导出）
      - storage_data:/opt/monica-server/storage
      # 持久化数据库
      - db_data:/opt/monica-server/db
    networks:
      - backend
      - frontend
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Nginx（反向代理 + 限流 + 静态文件）────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # 静态文件直接由 nginx 提供
      - ./static:/opt/monica-server/static:ro
      # HTTPS 证书（启用 HTTPS 时取消注释，需先创建 certs/ 目录并放入证书）
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy

volumes:
  redis_data:
    driver: local
  storage_data:
    driver: local
  db_data:
    driver: local

networks:
  backend:
    internal: true          # Redis ↔ App 内网通信，不暴露到宿主机
  frontend:
    driver: bridge           # Nginx ↔ App 通信
