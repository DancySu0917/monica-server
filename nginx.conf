user nginx;
worker_processes 1;           # 2C 服务器，1 个 worker 足够
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 限流区（必须在 http {} 顶部定义，避免 zone not found 报错）──
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m      rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=upload_limit:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:10m     rate=10r/m;
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # ── 日志 ─────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    gzip on;

    # ── 上传大小限制 ──────────────────────────────────────────────
    client_max_body_size 512M;
    client_body_timeout  120s;
    client_header_timeout 30s;

    # ── 上游 FastAPI ─────────────────────────────────────────────
    # Docker 部署：host 为 service name "app"；裸机部署请改为 127.0.0.1:8000
    upstream fastapi_backend {
        server app:8000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ── HTTP → HTTPS 重定向（生产环境取消注释）──
        # return 301 https://$host$request_uri;

        # ── 微信小程序文件验证 ────────────────────────────────────
        location = /MP_verify_xxxxxx.txt {
            alias /opt/monica-server/static/MP_verify_xxxxxx.txt;
        }

        # ── 鉴权接口：限流 10r/m ─────────────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_conn conn_limit 20;
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "keep-alive";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── 上传初始化 / 完成：限流（防滥用），不限分片上传本身 ─────
        location ~ ^/upload/(init|complete) {
            limit_req zone=upload_limit burst=10 nodelay;
            limit_conn conn_limit 10;
            proxy_pass             http://fastapi_backend;
            proxy_http_version     1.1;
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
            proxy_request_buffering off;
        }

        # ── 分片上传（PUT /upload/chunk）：不限流，限并发连接数即可 ──
        location /upload/ {
            limit_conn conn_limit 20;      # 每 IP 最多 20 条并发上传连接
            proxy_pass             http://fastapi_backend;
            proxy_http_version     1.1;
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
            proxy_request_buffering off;   # 大文件直流不缓存
        }

        # ── SSE 实时推送：禁止缓冲 ───────────────────────────────
        location /stream/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass              http://fastapi_backend;
            proxy_http_version      1.1;
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        Connection "";
            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      650s;   # SSE 连接保持（与 MAX_WAIT_SECONDS 对齐）
            chunked_transfer_encoding on;
            add_header              X-Accel-Buffering "no";
            add_header              Cache-Control "no-cache";
        }

        # ── 其他 API ─────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 50;
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "keep-alive";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }

    # ── HTTPS 配置（生产环境启用）────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate     /etc/ssl/certs/your.crt;
    #     ssl_certificate_key /etc/ssl/private/your.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}
